# Overlay 3 - landscape keypad
#
# The Atari 2600 keypad controller (used by Star Raiders, Codebreaker,
# Basic Programming, etc.) is a 3-column x 4-row matrix:
#     1  2  3
#     4  5  6
#     7  8  9
#     *  0  #
#
# Retropad binding (matches libretro-tia core): the D-pad lands on the
# 2/4/6/8 arrow positions (phone-keypad convention), keypad 5 is the
# primary action (A button), and the remaining 8 keys fill out the
# corners and outer column with face/shoulder buttons.
#
#     Keypad  Retropad
#       1     Y
#       2     UP
#       3     L
#       4     LEFT
#       5     A
#       6     RIGHT
#       7     X
#       8     DOWN
#       9     L2
#       *     L3
#       0     B
#       #     R
#
# START remains the console Reset button on both keypad overlays (so
# games like Star Raiders can be (re)started without switching back to
# the joystick overlay). SELECT, R2, R3 are unbound here.
#
# Layout: right half of screen, 3 columns × 4 rows of hit boxes.

overlay3_descs = 17

# 3x4 keypad on the right side of the screen, with breathing room from
# the right edge so the # key isn't clipped on aspect ratios beyond 16:9.

# Row 1: keys 1, 2, 3
overlay3_desc0 = "y,0.65,0.28,radial,0.05,0.075"
overlay3_desc0_overlay = ../flat/img/num1.png
